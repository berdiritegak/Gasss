<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}

/* LOGIN */
#login{
display:flex;flex-direction:column;
height:100vh;justify-content:center;align-items:center;
}
input,button{padding:10px;margin:5px;border-radius:6px;border:none}
button{cursor:pointer}

/* APP */
#app{display:none}
.header{
position:sticky;top:0;background:#000;padding:10px;z-index:10
}
.header input{width:95%}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}
.card{
background:#222;border-radius:10px;
overflow:hidden;cursor:pointer;
transition:0.2s;
}
.card:hover{transform:scale(1.03)}
.card img{width:100%;height:120px;object-fit:cover}
.card p{margin:5px;text-align:center;font-size:14px}

/* PAGINATION */
.pagination{
text-align:center;padding:10px
}
.pageBtn{
margin:3px;padding:6px 10px;border-radius:5px;
background:#333;color:#fff;border:none;cursor:pointer
}

/* POPUP */
#popup{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:black;
display:none;flex-direction:column;
z-index:100
}
#popup video{
width:100%;height:90%;background:black
}
.close{
background:red;padding:10px;text-align:center;
cursor:pointer
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<input id="search" placeholder="Cari video..." oninput="render()">
</div>

<div class="grid" id="grid"></div>
<div class="pagination" id="pagination"></div>

</div>

<!-- POPUP PLAYER -->
<div id="popup">
<div class="close" onclick="closeVideo()">TUTUP</div>
<video id="player" controls></video>
</div>

<script>
/* PASSWORD */
const PASSWORD="memek";

/* GANTI INI SESUAI GITHUB KAMU */
const BASE_URL="https://berdiritegak.github.io/Gasss";

/* DATA VIDEO */
let videos=[];
for(let i=1;i<=1000;i++){
videos.push({
title:"Video "+i,
url:`${BASE_URL}/videos/video${i}.mp4`,
thumb:`${BASE_URL}/thumbs/thumb${i}.jpg`
});
}

let page=1;
let limit=50;

/* LOGIN */
function login(){
if(document.getElementById("pass").value===PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
render();
}else{
alert("Password salah!");
}
}

/* RENDER VIDEO */
function render(){

let q=document.getElementById("search").value.toLowerCase();

let filtered=videos.filter(v=>
v.title.toLowerCase().includes(q)
);

let start=(page-1)*limit;
let end=start+limit;

let show=filtered.slice(start,end);

let grid=document.getElementById("grid");
grid.innerHTML="";

show.forEach(v=>{
grid.innerHTML+=`
<div class="card" onclick="openVideo('${v.url}')">
<img src="${v.thumb}">
<p>${v.title}</p>
</div>`;
});

/* PAGINATION */
let pages=Math.ceil(filtered.length/limit);
let pag=document.getElementById("pagination");
pag.innerHTML="";

for(let i=1;i<=pages;i++){
pag.innerHTML+=`
<button class="pageBtn" onclick="changePage(${i})">${i}</button>
`;
}
}

function changePage(i){
page=i;
render();
}

/* OPEN VIDEO */
function openVideo(url){
document.getElementById("popup").style.display="flex";
let player=document.getElementById("player");
player.src=url;
player.play();

/* fullscreen */
player.requestFullscreen?.();
}

/* CLOSE VIDEO */
function closeVideo(){
document.getElementById("popup").style.display="none";
document.getElementById("player").pause();
document.getElementById("player").src="";
}
</script>

</body>
</html>
