<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Video</title><style>
body{
background:#111;
color:white;
font-family:Arial,sans-serif;
text-align:center;
padding:20px;
}

.container{
max-width:800px;
margin:auto;
background:#222;
padding:20px;
border-radius:15px;
}

input,select,button{
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

button{
cursor:pointer;
}

video{
width:100%;
max-height:500px;
margin-top:20px;
border-radius:10px;
display:none;
}
</style></head><body><div class="container"><h2>🔒 Private Video</h2><input type="password" id="pass" placeholder="Masukkan Password"><br><select id="pilihVideo"></select>

<br><button onclick="bukaVideo()">Putar Video</button>

<br><video id="videoPlayer" controls></video>

</div><script>

const PASSWORD = "ngewe";

for(let i=1;i<=100;i++){

let option = document.createElement("option");

option.value = "video"+i+".mp4";

option.text = "Video "+i;

document.getElementById("pilihVideo").appendChild(option);

}

function bukaVideo(){

let password = document.getElementById("pass").value;

if(password !== PASSWORD){

alert("Password Salah");

return;

}

let video = document.getElementById("pilihVideo").value;

let player = document.getElementById("videoPlayer");

player.src = video;

player.style.display = "block";

player.load();

}

</script></body>
</html>
