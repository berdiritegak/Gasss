<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Premium</title>
<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}
#login{display:flex;height:100vh;justify-content:center;align-items:center;flex-direction:column}
input,button{padding:10px;margin:5px}
#app{display:none}
.header{padding:10px;background:#000;position:sticky;top:0}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#222;padding:5px;border-radius:8px;cursor:pointer}
.card img{width:100%;border-radius:6px}
#popup{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:none;flex-direction:column}
#popup video{width:100%;height:90%}
.close{padding:10px;background:red;cursor:pointer;text-align:center}
.pagination{text-align:center;padding:10px}
button.page{margin:2px}
</style>
</head>
<body>

<div id="login">
<h2>Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<div id="app">
<div class="header">
<input id="search" placeholder="Cari video..." oninput="render()">
</div>

<div class="grid" id="grid"></div>
<div class="pagination" id="pagination"></div>
</div>

<div id="popup">
<div class="close" onclick="closeVideo()">Tutup</div>
<video id="player" controls></video>
</div>

<script>
const PASSWORD="memek";
let videos=[];
for(let i=1;i<=1000;i++){
videos.push({title:"Video "+i,url:"https://www.w3schools.com/html/mov_bbb.mp4",thumb:"https://picsum.photos/300/200?"+i});
}

let page=1,limit=50;

function login(){
if(document.getElementById("pass").value===PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
render();
}
}

function render(){
let q=document.getElementById("search").value.toLowerCase();
let filtered=videos.filter(v=>v.title.toLowerCase().includes(q));

let start=(page-1)*limit;
let show=filtered.slice(start,start+limit);

let grid=document.getElementById("grid");
grid.innerHTML="";

show.forEach(v=>{
grid.innerHTML+=`
<div class="card" onclick="openVideo('${v.url}')">
<img src="${v.thumb}">
<p>${v.title}</p>
</div>`;
});

let pages=Math.ceil(filtered.length/limit);
let pag=document.getElementById("pagination");
pag.innerHTML="";
for(let i=1;i<=pages;i++){
pag.innerHTML+=`<button class="page" onclick="page=${i};render()">${i}</button>`;
}
}

function openVideo(url){
document.getElementById("popup").style.display="flex";
document.getElementById("player").src=url;
document.getElementById("player").requestFullscreen?.();
}

function closeVideo(){
document.getElementById("popup").style.display="none";
document.getElementById("player").pause();
}
</script>

</body>
</html>
