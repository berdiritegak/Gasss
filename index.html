<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library</title>

<style>
body{margin:0;font-family:Arial;background:#111;color:#fff}

/* LOGIN */
#login{
display:flex;flex-direction:column;
height:100vh;justify-content:center;align-items:center;
}
input,button{padding:10px;margin:5px;border-radius:6px;border:none}

/* APP */
#app{display:none}
.header{
position:sticky;top:0;background:#000;padding:10px;z-index:10
}
.header input{width:95%}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}
.card{
background:#222;border-radius:10px;
overflow:hidden;cursor:pointer;
}
.card img{width:100%;height:120px;object-fit:cover}
.card p{margin:5px;text-align:center}
.card small{color:#aaa;display:block;text-align:center;padding-bottom:5px}

/* PAGINATION */
.pagination{text-align:center;padding:10px}
.pageBtn{margin:2px;padding:6px 10px;background:#333;color:#fff;border:none}

/* POPUP */
#popup{
position:fixed;top:0;left:0;
width:100%;height:100%;
background:black;
display:none;
flex-direction:column;
z-index:100;
}
#popup video{width:100%;height:80%}
.close{background:red;padding:10px;text-align:center;cursor:pointer}

.navBtn{
position:absolute;
top:40%;
padding:15px;
font-size:25px;
background:rgba(0,0,0,0.5);
color:#fff;
border:none;
cursor:pointer;
}
#prev{left:10px}
#next{right:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<input id="search" placeholder="Cari video..." oninput="render()">
</div>

<div class="grid" id="grid"></div>
<div class="pagination" id="pagination"></div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="close" onclick="closeVideo()">TUTUP</div>

<h3 id="popupTitle" style="margin:10px"></h3>
<p id="popupDesc" style="margin:10px;color:#aaa"></p>

<div style="position:relative">
<video id="player" controls></video>

<button id="prev" class="navBtn" onclick="prevVideo()">⬅</button>
<button id="next" class="navBtn" onclick="nextVideo()">➡</button>
</div>

</div>

<script>

const PASSWORD="memek";
const BASE_URL="https://berdiritegak.github.io/Gasss";

let videos=[];
for(let i=1;i<=1000;i++){
videos.push({
title:"Video "+i,
desc:"Deskripsi video "+i,
url:`${BASE_URL}/videos/video${i}.mp4`,
thumb:`${BASE_URL}/thumbs/thumb${i}.jpg`
});
}

let page=1;
let limit=50;
let currentIndex=0;

/* LOGIN */
function login(){
if(document.getElementById("pass").value===PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
render();
}
}

/* RENDER */
function render(){

let q=document.getElementById("search").value.toLowerCase();

let filtered=videos.filter(v=>
v.title.toLowerCase().includes(q)
);

let start=(page-1)*limit;
let show=filtered.slice(start,start+limit);

let grid=document.getElementById("grid");
grid.innerHTML="";

show.forEach((v,i)=>{
grid.innerHTML+=`
<div class="card" onclick="openVideo(${start+i})">
<img src="${v.thumb}">
<p>${v.title}</p>
<small>${v.desc}</small>
</div>`;
});

/* pagination */
let pages=Math.ceil(filtered.length/limit);
let pag=document.getElementById("pagination");
pag.innerHTML="";

for(let i=1;i<=pages;i++){
pag.innerHTML+=`
<button class="pageBtn" onclick="page=${i};render()">${i}</button>
`;
}
}

/* OPEN VIDEO */
function openVideo(index){
currentIndex=index;

let v=videos[currentIndex];

document.getElementById("popup").style.display="flex";
document.getElementById("player").src=v.url;
document.getElementById("player").play();

document.getElementById("popupTitle").innerText=v.title;
document.getElementById("popupDesc").innerText=v.desc;
}

/* NEXT */
function nextVideo(){
if(currentIndex<videos.length-1){
currentIndex++;
openVideo(currentIndex);
}
}

/* PREV */
function prevVideo(){
if(currentIndex>0){
currentIndex--;
openVideo(currentIndex);
}
}

/* CLOSE */
function closeVideo(){
document.getElementById("popup").style.display="none";
document.getElementById("player").pause();
document.getElementById("player").src="";
}

</script>

</body>
</html>
