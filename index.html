<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PENIKMAT MUDA</title>
<style>
body{margin:0;background:#141414;color:#fff;font-family:Arial,sans-serif}
header{background:#000;padding:20px;text-align:center}
.logo{font-size:32px;font-weight:bold;color:#e50914}
.tagline{color:#bbb}
#login{max-width:400px;margin:60px auto;text-align:center}
input,button{padding:12px;border-radius:8px;border:none}
button{cursor:pointer}
#app{display:none;padding:20px}
#search{width:100%;max-width:500px;margin:0 auto 20px;display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.card{background:#222;border-radius:10px;overflow:hidden;cursor:pointer;transition:.2s}
.card:hover{transform:scale(1.04)}
.card img{width:100%;height:240px;object-fit:cover}
.title{padding:10px;text-align:center}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:999}
.modal-content{max-width:1000px;margin:20px auto;background:#181818;padding:20px;border-radius:12px}
.close{float:right;font-size:28px;cursor:pointer}
video{width:100%;border-radius:10px}
</style>
</head>
<body>

<header>
<div class="logo">🎬 PENIKMAT MUDA</div>
<div class="tagline">Streaming Video Pribadi</div>
</header>

<div id="login">
<h2>Masukkan Password</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<div id="app">
<input type="text" id="search" placeholder="Cari Video..." onkeyup="cariVideo()">
<div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="tutupModal()">✖</span>
<h2 id="judul"></h2>
<p id="deskripsi"></p>
<video id="player" controls></video>
<br><br>
<button onclick="fullscreenVideo()">⛶ Fullscreen</button>
</div>
</div>

<script>
const PASSWORD="memek";

function login(){
 if(document.getElementById('pass').value===PASSWORD){
   document.getElementById('login').style.display='none';
   document.getElementById('app').style.display='block';
 }else{
   alert('Password salah');
 }
}

const videos=[];
for(let i=1;i<=1000;i++){
 videos.push({
   title:'Video '+i,
   file:'videos/video'+i+'.mp4',
   thumb:'thumbs/thumb'+i+'.jpg',
   desc:'Koleksi Video '+i
 });
}

const grid=document.getElementById('grid');

function render(list){
 grid.innerHTML='';
 list.forEach(v=>{
   grid.innerHTML+=`
   <div class="card" onclick="bukaModal('${v.title}','${v.desc}','${v.file}')">
     <img src="${v.thumb}" onerror="this.src='https://via.placeholder.com/300x450?text=Video'">
     <div class="title">${v.title}</div>
   </div>`;
 });
}

function cariVideo(){
 let k=document.getElementById('search').value.toLowerCase();
 render(videos.filter(v=>v.title.toLowerCase().includes(k)));
}

function bukaModal(title,desc,file){
 document.getElementById('judul').innerText=title;
 document.getElementById('deskripsi').innerText=desc;
 document.getElementById('player').src=file;
 document.getElementById('modal').style.display='block';
}

function tutupModal(){
 document.getElementById('modal').style.display='none';
 document.getElementById('player').pause();
}

function fullscreenVideo(){
 const v=document.getElementById('player');
 if(v.requestFullscreen) v.requestFullscreen();
}

render(videos);
</script>
</body>
</html>
