<!DOCTYPE html>
<html lang="id">
  <!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9SY5SSSV3Y"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-9SY5SSSV3Y');
</script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Library</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:#fff;
}

/* background cinematic ringan */
body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:
radial-gradient(circle at top, rgba(255,0,80,0.15), transparent 40%),
radial-gradient(circle at bottom, rgba(0,100,255,0.15), transparent 40%);
z-index:-1;
}

/* LOGIN */
#login{
display:flex;
flex-direction:column;
height:100vh;
justify-content:center;
align-items:center;
}
input,button{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

/* HEADER */
.header{
position:sticky;
top:0;
background:#000;
padding:10px;
z-index:10;
}
.header input{
width:95%;
padding:10px;
border-radius:6px;
border:none;
background:#111;
color:#fff;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}
.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:120px;
object-fit:cover;
}

.card p{
margin:5px;
text-align:center;
font-weight:bold;
}

.card small{
display:block;
text-align:center;
color:#aaa;
padding-bottom:6px;
}

/* PAGINATION */
.pagination{
text-align:center;
padding:10px;
}
.pageBtn{
margin:2px;
padding:6px 10px;
background:#333;
color:#fff;
border:none;
}

/* POPUP */
#popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:none;
flex-direction:column;
z-index:100;
}

#popup video{
width:100%;
height:80%;
}

.close{
background:red;
padding:10px;
text-align:center;
cursor:pointer;
}

.navBtn{
position:absolute;
top:40%;
padding:12px;
font-size:22px;
background:rgba(0,0,0,0.5);
color:#fff;
border:none;
cursor:pointer;
}
#prev{left:10px}
#next{right:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<input id="search" placeholder="Cari video..." oninput="render()">
</div>

<div class="grid" id="grid"></div>
<div class="pagination" id="pagination"></div>

</div>

<!-- POPUP -->
<div id="popup">
<div class="close" onclick="closeVideo()">TUTUP</div>

<h3 id="popupTitle" style="margin:10px"></h3>
<p id="popupDesc" style="margin:10px;color:#aaa"></p>

<div style="position:relative">
<video id="player" controls></video>

<button id="prev" class="navBtn" onclick="prevVideo()">⬅</button>
<button id="next" class="navBtn" onclick="nextVideo()">➡</button>
</div>
</div>

<script>

const PASSWORD="memek";
const BASE_URL="https://berdiritegak.github.io/Gasss";

let videos=[];
for(let i=1;i<=1000;i++){
videos.push({
title:"Video "+i,
desc:"Deskripsi video "+i,
url:`${BASE_URL}/videos/video${i}.mp4`,
thumb:`${BASE_URL}/thumbs/thumb${i}.jpg`
});
}

let page=1;
let limit=50;
let currentIndex=0;

/* LOGIN */
function login(){
if(document.getElementById("pass").value===PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
render();
}
}

/* RENDER */
function render(){

let q=document.getElementById("search").value.toLowerCase();

let filtered=videos.filter(v=>
v.title.toLowerCase().includes(q)
);

let start=(page-1)*limit;
let show=filtered.slice(start,start+limit);

let grid=document.getElementById("grid");
grid.innerHTML="";

show.forEach((v,i)=>{
grid.innerHTML+=`
<div class="card" onclick="openVideo(${start+i})">
<img src="${v.thumb}">
<p>${v.title}</p>
<small>${v.desc}</small>
</div>`;
});

/* pagination */
let pages=Math.ceil(filtered.length/limit);
let pag=document.getElementById("pagination");
pag.innerHTML="";

for(let i=1;i<=pages;i++){
pag.innerHTML+=`
<button class="pageBtn" onclick="page=${i};render()">${i}</button>
`;
}
}

/* OPEN */
function openVideo(index){
currentIndex=index;

let v=videos[currentIndex];

document.getElementById("popup").style.display="flex";
document.getElementById("player").src=v.url;
document.getElementById("player").play();

document.getElementById("popupTitle").innerText=v.title;
document.getElementById("popupDesc").innerText=v.desc;
}

/* NEXT PREV */
function nextVideo(){
if(currentIndex<videos.length-1){
openVideo(currentIndex+1);
}
}

function prevVideo(){
if(currentIndex>0){
openVideo(currentIndex-1);
}
}

/* CLOSE */
function closeVideo(){
document.getElementById("popup").style.display="none";
document.getElementById("player").pause();
document.getElementById("player").src="";
}

</script>

</body>
</html>
