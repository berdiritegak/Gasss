<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinematic Video Library</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

/* BACKGROUND CINEMATIC */
body::before{
content:"";
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:
radial-gradient(circle at top, rgba(255,0,80,0.2), transparent 40%),
radial-gradient(circle at bottom, rgba(0,100,255,0.2), transparent 40%),
linear-gradient(to bottom, #000, #0a0a0a);
z-index:-1;
}

/* LOGIN */
#login{
display:flex;
flex-direction:column;
height:100vh;
justify-content:center;
align-items:center;
}
input,button{
padding:12px;
margin:5px;
border:none;
border-radius:8px;
}

/* HERO */
.hero{
height:40vh;
padding:20px;
display:flex;
flex-direction:column;
justify-content:flex-end;
background:
linear-gradient(to top, #000, transparent),
url('https://picsum.photos/1200/600?blur=2') center/cover;
}
.hero h1{margin:0;font-size:28px}
.hero p{color:#aaa}

/* APP */
#app{display:none}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
padding:15px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
box-shadow:0 10px 20px rgba(0,0,0,0.5);
}
.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card p{
margin:8px;
font-weight:bold;
}

.card small{
display:block;
margin-bottom:10px;
color:#aaa;
}

/* POPUP CINEMATIC */
#popup{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
z-index:100;
}

#popup video{
width:100%;
height:80%;
background:black;
}

.close{
background:red;
padding:10px;
text-align:center;
cursor:pointer;
}

/* SEARCH */
.header{
padding:10px;
}
.header input{
width:95%;
padding:12px;
border-radius:8px;
border:none;
background:#111;
color:#fff;
}

/* BUTTON NAV */
.navBtn{
position:absolute;
top:40%;
font-size:30px;
padding:10px;
background:rgba(255,255,255,0.1);
border:none;
color:#fff;
cursor:pointer;
}
#prev{left:10px}
#next{right:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<h2>Cinematic Login</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<!-- APP -->
<div id="app">

<div class="hero">
<h1>🔥 Film & Video Library</h1>
<p>Streaming cinematic experience</p>
</div>

<div class="header">
<input id="search" placeholder="Cari video..." oninput="render()">
</div>

<div class="grid" id="grid"></div>
</div>

<!-- POPUP -->
<div id="popup">
<div class="close" onclick="closeVideo()">TUTUP</div>

<h3 id="popupTitle" style="margin:10px"></h3>
<p id="popupDesc" style="margin:10px;color:#aaa"></p>

<div style="position:relative">
<video id="player" controls></video>

<button id="prev" class="navBtn" onclick="prevVideo()">⬅</button>
<button id="next" class="navBtn" onclick="nextVideo()">➡</button>
</div>
</div>

<script>

const PASSWORD="memek";
const BASE_URL="https://berdiritegak.github.io/Gasss";

let videos=[];
for(let i=1;i<=100;i++){
videos.push({
title:"Cinematic Video "+i,
desc:"Experience cinematic quality video "+i,
url:`${BASE_URL}/videos/video${i}.mp4`,
thumb:`https://picsum.photos/400/300?random=${i}`
});
}

let currentIndex=0;

/* LOGIN */
function login(){
if(document.getElementById("pass").value===PASSWORD){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
render();
}
}

/* RENDER */
function render(){
let q=document.getElementById("search").value.toLowerCase();
let grid=document.getElementById("grid");
grid.innerHTML="";

videos.filter(v=>v.title.toLowerCase().includes(q))
.forEach((v,i)=>{
grid.innerHTML+=`
<div class="card" onclick="openVideo(${i})">
<img src="${v.thumb}">
<p>${v.title}</p>
<small>${v.desc}</small>
</div>`;
});
}

/* OPEN */
function openVideo(i){
currentIndex=i;
let v=videos[i];

document.getElementById("popup").style.display="flex";
document.getElementById("player").src=v.url;
document.getElementById("player").play();

document.getElementById("popupTitle").innerText=v.title;
document.getElementById("popupDesc").innerText=v.desc;
}

/* NEXT PREV */
function nextVideo(){
if(currentIndex<videos.length-1) openVideo(currentIndex+1);
}
function prevVideo(){
if(currentIndex>0) openVideo(currentIndex-1);
}

/* CLOSE */
function closeVideo(){
document.getElementById("popup").style.display="none";
document.getElementById("player").pause();
}

</script>

</body>
</html>
